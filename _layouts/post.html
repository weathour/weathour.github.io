---
layout: default
---

<article class="post-page">
  <p class="post-meta">{{ page.date | date: "%Y-%m-%d" }}</p>
  <h1>{{ page.title }}</h1>
  {% if page.tags and page.tags.size > 0 %}
  <p>
    {% for tag in page.tags %}
    <span class="tag">{{ tag }}</span>
    {% endfor %}
  </p>
  {% endif %}
  {{ content }}
</article>
